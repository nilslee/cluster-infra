jenkins:
  systemMessage: "k8s-lab Jenkins -- configured via JCasC"
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy: loggedInUsersCanDoAnything

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "github-pat"
              username: "x-access-token"
              password: "${GITHUB_PAT}"
              description: "GitHub PAT (classic token with repo scope) for cloning repos and pushing to cluster-infra"

unclassified:
  location:
    url: "http://192.168.56.10:8080/"

# The pipeline jobs are created by the seed job below.
# This avoids the circular dependency between JCasC and Job DSL.
# The actual pipeline definitions are loaded from the Jenkinsfiles in /jenkins/pipelines/
