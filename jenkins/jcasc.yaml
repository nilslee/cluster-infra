jenkins:
  systemMessage: "k8s-lab Jenkins -- configured via JCasC"
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy: loggedInUsersCanDoAnything

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "github-pat"
              username: "aaronlee232"
              password: "${GITHUB_PAT}"
              description: "PAT for cloning repos and pushing to cluster-infra"

unclassified:
  location:
    url: "http://192.168.56.10:8080/"

jobs:
  - script: >
      pipelineJob('my-redis') {
          definition {
              cps {
                  script(readFileFromWorkspace('/jenkins/pipelines/my-redis.Jenkinsfile'))
                  sandbox(true)
              }
          }
          triggers {
              scm('H/2 * * * *')
          }
      }

      pipelineJob('redis-gui-tester') {
          definition {
              cps {
                  script(readFileFromWorkspace('/jenkins/pipelines/redis-gui-tester.Jenkinsfile'))
                  sandbox(true)
              }
          }
          triggers {
              scm('H/2 * * * *')
          }
      }

      pipelineJob('mcp-server') {
          definition {
              cps {
                  script(readFileFromWorkspace('/jenkins/pipelines/mcp-server.Jenkinsfile'))
                  sandbox(true)
              }
          }
          triggers {
              scm('H/5 * * * *')
          }
      }
