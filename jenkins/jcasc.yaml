jenkins:
  systemMessage: "k8s-lab Jenkins -- configured via JCasC"
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy: loggedInUsersCanDoAnything

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "github-pat"
              username: "x-access-token"
              password: "${GITHUB_PAT}"
              description: "GitHub PAT (classic token with repo scope) for cloning repos and pushing to cluster-infra"
          - usernamePassword:
              scope: GLOBAL
              id: "mcp-grafana-loki"
              username: "${GRAFANA_USERNAME}"
              password: "${GRAFANA_PASSWORD}"
              description: "MCP Loki client basic auth (Grafana ingress); optional for labs without auth"

unclassified:
  location:
    # Must match the URL users use in the browser (nginx on :80 → Jenkins on 8080).
    url: "http://jenkins.k8s.lab/"

# The seed job below is created by JCasC on every startup.
# It polls cluster-infra for changes to seed_jobs.groovy and re-runs when detected.
# Pipeline jobs are defined via cpsScm — they pull their Jenkinsfile from cluster-infra at runtime.
jobs:
  - script: >
      freeStyleJob('seed') {
        description('Runs seed_jobs.groovy to create/update all pipeline jobs')
        scm {
          git {
            remote {
              url('https://github.com/aaronlee232/cluster-infra.git')
              credentials('github-pat')
            }
            branch('*/main')
          }
        }
        triggers {
          scm('H/5 * * * *')
        }
        steps {
          jobDsl {
            targets('jenkins/seed_jobs.groovy')
            removedJobAction('IGNORE')
            removedViewAction('IGNORE')
          }
        }
      }
