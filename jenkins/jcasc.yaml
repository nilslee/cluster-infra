jenkins:
  systemMessage: "k8s-lab Jenkins -- configured via JCasC"
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy: loggedInUsersCanDoAnything

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "github-pat"
              username: "x-access-token"
              password: "${GITHUB_PAT}"
              description: "GitHub PAT (classic token with repo scope) for cloning repos and pushing to cluster-infra"
          - usernamePassword:
              scope: GLOBAL
              id: "mcp-grafana-loki"
              username: "${GRAFANA_USERNAME}"
              password: "${GRAFANA_PASSWORD}"
              description: "MCP Loki client basic auth (Grafana ingress); optional for labs without auth"

unclassified:
  location:
    # Must match the URL users use in the browser (nginx on :80 → Jenkins on 8080).
    url: "http://jenkins.k8s.lab/"

# The pipeline jobs are created by the seed job below.
# This avoids the circular dependency between JCasC and Job DSL.
# The actual pipeline definitions are loaded from the Jenkinsfiles in /jenkins/pipelines/
