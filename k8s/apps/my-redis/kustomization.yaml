apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: k8s-lab
resources:
  - deployment.yaml
  - service.yaml
images:
  - name: my-redis
    newName: 192.168.56.10:5001/my-redis
    # CI updates newTag via: kustomize edit set image my-redis=192.168.56.10:5001/my-redis:<sha>
    newTag: latest
