apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-redis
  namespace: k8s-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-redis
  template:
    metadata:
      labels:
        app: my-redis
    spec:
      containers:
        - name: app
          # Image name matches the `name` field in kustomization.yaml images section.
          # Kustomize rewrites this to 192.168.56.10:5001/my-redis:<tag> at render time.
          image: my-redis
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
