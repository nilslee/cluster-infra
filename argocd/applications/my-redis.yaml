apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-redis
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aaronlee232/cluster-infra.git
    targetRevision: main
    path: k8s/apps/my-redis
  destination:
    server: https://kubernetes.default.svc
    namespace: k8s-lab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
